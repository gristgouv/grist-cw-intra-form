<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grist Custom Widget</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/dompurify@3/dist/purify.min.js"></script>
  <link href="fonts/fonts.css" rel="stylesheet">
  <link href="marianne.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- Overlay pour les popups -->
    <div class="popup-overlay" :class="{ show: showOverlay }" @click="closeAllPopups"></div>

    <!-- Modal de configuration -->
    <div class="modal" :class="{ show: showConfigModal }">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Configuration du formulaire</h2>
          <button class="preview-btn" @click="showConfigModal = false">Previsualiser</button>
        </div>

        <!-- Parametres globaux -->
        <div class="global-settings">
          <div class="setting-group">
            <label>Police</label>
            <select v-model="globalFont" @change="saveConfiguration" class="setting-select">
              <option value="">Par defaut</option>
              <option value="'Marianne', sans-serif">Marianne (Etat)</option>
              <option value="'Roboto', sans-serif">Roboto</option>
              <option value="'Lato', sans-serif">Lato</option>
              <option value="'Montserrat', sans-serif">Montserrat</option>
              <option value="'Raleway', sans-serif">Raleway</option>
              <option value="'Oswald', sans-serif">Oswald</option>
              <option value="'Nunito', sans-serif">Nunito</option>
              <option value="Arial, sans-serif">Arial</option>
              <option value="Helvetica, sans-serif">Helvetica</option>
              <option value="Verdana, sans-serif">Verdana</option>
              <option value="Georgia, serif">Georgia</option>
              <option value="'Times New Roman', serif">Times New Roman</option>
            </select>
          </div>
          <div class="setting-group">
            <label>Marges</label>
            <select v-model="globalPadding" @change="saveConfiguration" class="setting-select">
              <option value="">Par defaut</option>
              <option value="small">Petites</option>
              <option value="medium">Moyennes</option>
              <option value="large">Grandes</option>
            </select>
          </div>
        </div>

        <!-- Liste des elements du formulaire -->
        <div class="modal-body">
          <div
            v-for="(element, index) in formElements"
            :key="index"
            class="element-item"
            draggable="true"
            @dragstart="onDragStart(index, $event)"
            @dragend="onDragEnd"
            @dragover.prevent="onDragOver(index, $event)"
            @drop="onDrop(index, $event)"
            :class="{ 'drag-over-top': dragOverIndex === index && dragPosition === 'top', 'drag-over-bottom': dragOverIndex === index && dragPosition === 'bottom' }"
          >
            <div class="drag-handle">&#8942;&#8942;</div>
            <div class="element-content-wrapper">
              <!-- Champ de formulaire -->
              <template v-if="element.type === 'field'">
                <div class="field-label-wrapper">
                  <span class="field-label-text" v-html="element.fieldLabel || element.fieldName"></span>
                </div>
                <div class="element-preview field">Id colonne : {{ element.fieldName }}</div>
              </template>
              <!-- Separateur -->
              <template v-else-if="element.type === 'separator'">
                <div class="element-preview separator"></div>
              </template>
              <!-- Texte -->
              <template v-else>
                <div class="element-preview text" v-html="element.content"></div>
              </template>
            </div>
            <div class="element-controls">
              <!-- Boutons pour les champs -->
              <template v-if="element.type === 'field'">
                <div class="icon-btn" @click="editLabel(index)" title="Modifier le libelle">&#9998;</div>
                <div class="icon-btn" :class="{ active: element.required }" @click="toggleRequired(index)" title="Obligatoire">&#10022;</div>
                <div class="icon-btn" :class="{ active: element.conditional }" @click="showFilterPopup(index)" title="Conditionnel">&#9889;</div>
                <div v-if="isTextOrNumericField(element)" class="icon-btn" :class="{ active: element.maxLength }" @click="showValidationPopup(index)" title="Critère de validation">&#10003;</div>
                <div v-if="isPureTextField(element)" class="icon-btn" :class="{ active: element.multiline }" @click="toggleMultiline(index)" title="Multiligne">&#9776;</div>
              </template>
              <!-- Bouton edit pour texte -->
              <template v-if="element.type === 'text'">
                <div class="icon-btn" @click="editContent(index)" title="Modifier">&#9998;</div>
              </template>
              <!-- Bouton supprimer -->
              <button @click="removeElement(index)">&#128465;</button>
            </div>
          </div>
        </div>

        <!-- Section ajout d'element -->
        <div class="add-section">
          <div class="add-section-fields">
            <select v-model="newElementType" class="element-input">
              <option value="">-- Type d'élément --</option>
              <option value="column">Colonne de la table</option>
              <option value="separator">Séparateur</option>
              <option value="text">Texte libre</option>
            </select>
            <select v-if="newElementType === 'column'" v-model="selectedColumn" class="element-input">
              <option value="">-- Sélectionner une colonne --</option>
              <option v-for="col in availableColumns" :key="col" :value="col">{{ col }}</option>
            </select>
            <textarea v-if="newElementType === 'text'" v-model="newElementContent" class="element-input" rows="3" placeholder="Texte"></textarea>
          </div>
          <button class="add-element-btn" @click="addElement">Ajouter</button>
        </div>
      </div>
    </div>

    <!-- Formulaire principal -->
    <div class="container" :style="containerStyle">
      <template v-for="element in formElements" :key="element.fieldName || element.content">
        <!-- Séparateur -->
        <div v-if="element.type === 'separator'" class="separator"></div>
        <!-- Texte -->
        <div v-else-if="element.type === 'text'" class="custom-text" v-html="element.content"></div>
        <!-- Champ -->
        <div
          v-else-if="element.type === 'field'"
          class="field"
          :class="{ 'checkbox-field': columnMetadata[element.fieldName]?.isBool, hidden: !shouldShowField(element) }"
        >
          <template v-if="columnMetadata[element.fieldName]?.isBool">
            <input type="checkbox" v-model="formData[element.fieldName]">
            <label v-html="getLabelHtml(element)"></label>
          </template>
          <template v-else>
            <label v-html="getLabelHtml(element)"></label>
            <!-- Input selon le type de colonne -->
            <!-- Attachments -->
            <div v-if="columnMetadata[element.fieldName]?.isAttachment" class="attachment-input">
              <input
                type="file"
                multiple
                :id="'file_' + element.fieldName"
                style="display: none"
                @change="onFileSelect(element.fieldName, $event)"
              >
              <button type="button" class="attachment-btn" @click="triggerFileInput(element.fieldName)">Charger une PJ</button>
              <div class="attachment-list">
                <div v-for="(file, idx) in pendingAttachments[element.fieldName]" :key="idx" class="attachment-item">
                  <span class="attachment-name">{{ file.name }}</span>
                  <span class="attachment-size">{{ formatFileSize(file.size) }}</span>
                  <button type="button" class="attachment-remove" @click="removeAttachment(element.fieldName, idx)">×</button>
                </div>
              </div>
            </div>
            <!-- DateTime -->
            <input
              v-else-if="columnMetadata[element.fieldName]?.isDateTime"
              type="datetime-local"
              v-model="formData[element.fieldName]"
            >
            <!-- Date -->
            <input
              v-else-if="columnMetadata[element.fieldName]?.isDate"
              type="date"
              v-model="formData[element.fieldName]"
            >
            <!-- Select multiple (ChoiceList, RefList) -->
            <select
              v-else-if="columnMetadata[element.fieldName]?.isMultiple"
              multiple
              v-model="formData[element.fieldName]"
            >
              <option
                v-for="opt in getSelectOptions(element)"
                :key="opt.id"
                :value="opt.id"
              >{{ opt.label }}</option>
            </select>
            <!-- Select simple (Choice, Ref) -->
            <select
              v-else-if="hasSelectOptions(element)"
              v-model="formData[element.fieldName]"
            >
              <option value="">-- Sélectionner --</option>
              <option
                v-for="opt in getSelectOptions(element)"
                :key="opt.id"
                :value="opt.id"
              >{{ opt.label }}</option>
            </select>
            <!-- Textarea (multiline) -->
            <textarea
              v-else-if="element.multiline"
              v-model="formData[element.fieldName]"
              rows="4"
            ></textarea>
            <!-- Input texte/numerique par defaut -->
            <input
              v-else
              type="text"
              v-model="formData[element.fieldName]"
            >
          </template>
          <div v-if="errors[element.fieldName]" class="error-message show">{{ errors[element.fieldName] }}</div>
        </div>
      </template>

      <div v-if="formErrorMessage" class="form-error show">{{ formErrorMessage }}</div>
      <div v-if="formSuccessMessage" class="form-success show">{{ formSuccessMessage }}</div>
      <button class="btn" @click="submitForm">Valider</button>
    </div>

    <!-- Popup d'edition de texte riche -->
    <div v-if="editPopup.show" class="edit-popup rich-editor" @click="closePickersOnClickOutside($event)">
      <h3>{{ editPopup.title }}</h3>
      <div class="editor-toolbar">
        <button type="button" class="toolbar-btn" :class="{ active: activeFormats.bold }" @click="execCmd('bold')" title="Gras (Ctrl+B)"><strong>B</strong></button>
        <button type="button" class="toolbar-btn" :class="{ active: activeFormats.italic }" @click="execCmd('italic')" title="Italique (Ctrl+I)"><em>I</em></button>
        <button type="button" class="toolbar-btn" :class="{ active: activeFormats.underline }" @click="execCmd('underline')" title="Souligne (Ctrl+U)"><u>U</u></button>
        <span class="toolbar-sep"></span>
        <button type="button" class="toolbar-btn" @click="execCmd('insertUnorderedList')" title="Liste a puces">•</button>
        <button type="button" class="toolbar-btn" @click="insertLink" title="Lien">🔗</button>
        <div class="color-picker-wrapper">
          <button type="button" class="toolbar-btn" @click.stop="toggleEmojiPicker" title="Emoji">😀</button>
          <div class="emoji-picker" :class="{ show: emojiPicker.show }">
            <button v-for="emoji in emojis" :key="emoji" type="button" class="emoji-btn" @click="insertEmoji(emoji)">{{ emoji }}</button>
          </div>
        </div>
        <span class="toolbar-sep"></span>
        <select class="toolbar-select" @change="applyFormat($event)" title="Style">
          <option value="">Style</option>
          <option value="h1">Titre 1</option>
          <option value="h2">Titre 2</option>
          <option value="h3">Titre 3</option>
          <option value="p">Paragraphe</option>
        </select>
        <span class="toolbar-sep"></span>
        <div class="color-picker-wrapper">
          <button type="button" class="toolbar-btn" @click.stop="toggleColorPicker('text')" title="Couleur du texte"><span class="color-icon">A</span></button>
          <div class="color-picker" :class="{ show: colorPicker.show && colorPicker.type === 'text' }">
            <button type="button" class="color-btn no-color" @click="removeColor('foreColor')" title="Aucune couleur"></button>
            <button v-for="color in editorColors" :key="color" type="button" class="color-btn" :style="{ background: color }" @click="applyColor('foreColor', color)"></button>
          </div>
        </div>
        <div class="color-picker-wrapper">
          <button type="button" class="toolbar-btn" @click.stop="toggleColorPicker('bg')" title="Couleur de fond"><span class="bg-color-icon">A</span></button>
          <div class="color-picker" :class="{ show: colorPicker.show && colorPicker.type === 'bg' }">
            <button type="button" class="color-btn no-color" @click="removeColor('backColor')" title="Aucune couleur"></button>
            <button v-for="color in editorColors" :key="'bg-'+color" type="button" class="color-btn" :style="{ background: color }" @click="applyColor('backColor', color)"></button>
          </div>
        </div>
      </div>
      <div
        ref="richEditor"
        class="rich-editor-content"
        contenteditable="true"
        @keydown="onEditorKeydown"
        @keyup="onEditorSelect"
        @mouseup="onEditorSelect"
        v-html="editPopup.value"
      ></div>
      <div class="edit-popup-buttons">
        <button class="cancel" @click="closeEditPopup">Annuler</button>
        <button class="save" @click="saveRichEdit">Enregistrer</button>
      </div>
    </div>

    <!-- Popup de condition -->
    <div v-if="filterPopup.show" class="filter-popup">
      <h3>Affichage conditionnel</h3>
      <div class="filter-row">
        <label>Ce champ est affiché si :</label>
      </div>
      <div class="filter-row">
        <select v-model="filterPopup.field" @change="updateFilterValues">
          <option value="">-- Sélectionner un champ --</option>
          <option v-for="f in conditionalFields" :key="f.fieldName" :value="f.fieldName">{{ f.fieldName }}</option>
        </select>
      </div>
      <div class="filter-row">
        <select v-model="filterPopup.operator">
          <option value="equals">est égal à</option>
          <option value="notEquals">n'est pas égal à</option>
        </select>
      </div>
      <div class="filter-row">
        <select v-model="filterPopup.value">
          <option value="">-- Sélectionner une valeur --</option>
          <option v-for="v in filterPopup.values" :key="v.id" :value="v.id">{{ v.label }}</option>
        </select>
      </div>
      <div class="filter-popup-buttons">
        <button v-if="filterPopup.hasExisting" class="delete" @click="deleteFilter">Supprimer</button>
        <div style="display: flex; gap: 8px;">
          <button class="cancel" @click="filterPopup.show = false; showOverlay = false">Annuler</button>
          <button class="save" @click="saveFilter">Enregistrer</button>
        </div>
      </div>
    </div>

    <!-- Popup de validation (maxLength) -->
    <div v-if="validationPopup.show" class="validation-popup">
      <h3>Validation du champ</h3>
      <label>Nombre max de caractères :</label>
      <input type="number" v-model="validationPopup.maxLength" min="1">
      <div class="validation-popup-buttons">
        <button v-if="validationPopup.hasExisting" class="delete" @click="deleteValidation">Supprimer</button>
        <div style="display: flex; gap: 8px;">
          <button class="cancel" @click="validationPopup.show = false; showOverlay = false">Annuler</button>
          <button class="save" @click="saveValidation">Enregistrer</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
